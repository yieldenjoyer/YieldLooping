[profile.default]
src = "."
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.19"
via_ir = true                 # required: Aave looper exceeds the legacy stack limit without it
optimizer = true
optimizer_runs = 200

# Loose .sol files live in the repo root; keep the test dir separate.
# `forge install foundry-rs/forge-std` to add the test dependency.

[fmt]
line_length = 110
